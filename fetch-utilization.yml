name: Fetch Fleet Utilization

on:
  schedule:
    - cron: '0 13 * * 1'   # Every Monday 6:00 AM MT (UTC-7)
  workflow_dispatch:         # Manual trigger button in GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch utilization from Tableau Cloud
        env:
          TABLEAU_PAT_NAME:   ${{ secrets.TABLEAU_PAT_NAME }}
          TABLEAU_PAT_SECRET: ${{ secrets.TABLEAU_PAT_SECRET }}
        run: python fetch_utilization.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update fleet utilization $(date -u +'%Y-%m-%d')"
          git push
